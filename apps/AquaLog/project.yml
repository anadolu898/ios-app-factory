name: AquaLog
options:
  bundleIdPrefix: com.anadolu898
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "8.0.0"

settings:
  base:
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: "6.0"

targets:
  AquaLog:
    type: application
    platform: iOS
    sources:
      - path: AquaLog
        excludes:
          - "Preview Content"
    resources:
      - path: AquaLog/Resources
      - path: AquaLog/Preview Content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anadolu898.aqualog
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: AquaLog
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: '"AquaLog/Preview Content"'
        ENABLE_PREVIEWS: true
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "AquaLog reads your water intake and workout data to personalize hydration goals and suggest extra water after exercise."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "AquaLog saves your water intake to Apple Health so all your health data stays in one place."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "AquaLog checks your local weather to adjust your daily hydration goal for hot or humid conditions."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: AquaLog/AquaLog.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.security.application-groups:
          - group.com.anadolu898.aqualog
    dependencies:
      - target: AquaLogWidgets
        embed: true
      - package: RevenueCat
        product: RevenueCat
      - package: Sentry
        product: Sentry

  AquaLogWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: AquaLogWidgets
        excludes:
          - Info.plist
    info:
      path: AquaLogWidgets/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anadolu898.aqualog.widgets
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: AquaLogWidgets/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: AquaLog Widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: AquaLogWidgets/AquaLogWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anadolu898.aqualog

  AquaLogWatch:
    type: application
    platform: watchOS
    sources:
      - path: AquaLogWatch
        excludes:
          - WatchComplication.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anadolu898.aqualog.watch
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.anadolu898.aqualog
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: AquaLogWatch/AquaLogWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anadolu898.aqualog

  AquaLogWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: AquaLogWatch/WatchComplication.swift
      - path: AquaLogWatch/WatchDashboardView.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anadolu898.aqualog.watch.widgets
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: AquaLogWatch/AquaLogWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.anadolu898.aqualog

  AquaLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AquaLogTests
    dependencies:
      - target: AquaLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anadolu898.aqualog.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
